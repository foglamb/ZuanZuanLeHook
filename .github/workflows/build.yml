name: Build ZuanZuanLeHook APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 2. 设置 Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    # 3. 设置 Android 命令行工具
    - name: Set up Android Command Line Tools
      run: |
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p $HOME/android/cmdline-tools/latest
        mv cmdline-tools/* $HOME/android/cmdline-tools/latest/
        echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
        echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android/platform-tools" >> $GITHUB_PATH
        
    # 4. 接受 Android 许可证
    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true
        
    # 5. 安装必要的 SDK 组件
    - name: Install Android SDK components
      run: |
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"
        
    # 6. 给 Gradle 执行权限
    - name: Make gradlew executable
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi
        
    # 7. 构建 APK
    - name: Build APK with Gradle
      run: |
        ./gradlew assembleDebug --stacktrace --info || \
        gradle assembleDebug --stacktrace --info
        
    # 8. 查找生成的 APK
    - name: Find APK
      run: |
        echo "查找生成的APK文件..."
        find . -name "*.apk" -type f
        ls -lah app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug目录不存在"
        
    # 9. 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ZuanZuanLeHook-APK
        path: |
          app/build/outputs/apk/debug/*.apk
          **/*.apk
        retention-days: 30
        
    # 10. 显示构建信息
    - name: Build Summary
      run: |
        echo "### 🎉 构建完成！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**APK 文件位置:**" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        find . -name "*.apk" -type f >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
