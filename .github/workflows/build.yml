name: Build ZuanZuanLeHook APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 2. 设置 Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    # 3. 设置 Android SDK
    - name: Set up Android SDK
      run: |
        # 使用系统预装的 Android SDK
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        # 清空可能冲突的环境变量
        echo "ANDROID_NDK_HOME=""" >> $GITHUB_ENV
        
    # 4. 确认 SDK 安装
    - name: Verify SDK
      run: |
        ls -la $ANDROID_HOME/
        ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "需要安装platforms"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || echo "使用预装SDK"
        
    # 5. 给 Gradle 执行权限
    - name: Make gradlew executable
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi
        
    # 6. 构建 APK
    - name: Build APK with Gradle
      run: |
        # 移除 local.properties 避免与系统设置冲突
        rm -f local.properties
        ./gradlew assembleDebug --stacktrace --info
        
    # 7. 查找生成的 APK
    - name: Find APK
      run: |
        echo "查找生成的APK文件..."
        find . -name "*.apk" -type f
        ls -lah app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug目录不存在"
        
    # 8. 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ZuanZuanLeHook-APK
        path: |
          app/build/outputs/apk/debug/*.apk
          **/*.apk
        retention-days: 30
        
    # 9. 显示构建信息
    - name: Build Summary
      if: success()
      run: |
        echo "### 🎉 构建完成！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**下载 APK 步骤:**" >> $GITHUB_STEP_SUMMARY
        echo "1. 在页面底部的 Artifacts 区域下载 ZuanZuanLeHook-APK" >> $GITHUB_STEP_SUMMARY
        echo "2. 解压后即可获得 app-debug.apk" >> $GITHUB_STEP_SUMMARY
